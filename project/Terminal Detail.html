<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TOMS Terminal Detail — Explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  #root { height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="src/data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="src/charts.jsx"></script>
<script type="text/babel" src="src/logo.jsx"></script>
<script type="text/babel" src="src/dirA-shell.jsx"></script>
<script type="text/babel" src="src/dirA-tabs.jsx"></script>
<script type="text/babel" src="src/dirA-root.jsx"></script>
<script type="text/babel" src="src/dirA-list.jsx"></script>
<script type="text/babel" src="src/dirB-shell.jsx"></script>
<script type="text/babel" src="src/dirB-tabs.jsx"></script>
<script type="text/babel" src="src/dirC-shell.jsx"></script>
<script type="text/babel" src="src/dirC-tabs.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="list" title="Terminal List — parent page (Direction A)"
        subtitle="The fleet-wide list view with KPIs, filters, and bulk actions.">
        <DCArtboard id="list-A" label="Terminal List · Refined Enterprise" width={1360} height={900}>
          <ATerminalList />
        </DCArtboard>
      </DCSection>
      <DCSection id="directions" title="Terminal Detail — Redesign Explorations"
        subtitle="Three directions. Drag a card to reorder · click a label to focus.">
        <DCArtboard id="A" label="A · Refined Enterprise · anchored in brand blue" width={1360} height={900}>
          <DirectionA />
        </DCArtboard>
        <DCArtboard id="B" label="B · Ops Console · dense, keyboard-first (⌘K)" width={1360} height={900}>
          <DirectionB />
        </DCArtboard>
        <DCArtboard id="C" label="C · Dark Monitoring · NOC feel, live signals" width={1360} height={900}>
          <DirectionC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
